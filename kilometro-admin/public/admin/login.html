<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Kilometro Zero</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="mark">KZ</div>
            <h1>Admin Sign In</h1>
            <p>Kilometro Zero Organization</p>
        </div>

        <div class="auth-error" id="loginError"></div>

        <form id="loginForm">
            <div class="field">
                <label for="email">Admin Email</label>
                <input type="email" id="email" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="auth-btn" id="loginBtn">Sign In</button>
        </form>

        <p class="auth-footnote">This portal is restricted to the site administrator only.<br>Unauthorized access attempts are logged.</p>
    </div>
</div>

<script src="/admin/js/login.js"></script>
</body>
</html>
